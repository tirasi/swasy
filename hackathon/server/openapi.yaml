openapi: 3.0.0
info:
  title: BreakthroughAI Backend API
  version: 1.0.0
paths:
  /api/appointments:
    get:
      summary: List appointments
      responses:
        "200":
          description: OK
    post:
      summary: Create appointment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - patientId
                - doctorId
                - date
                - time
              properties:
                patientId:
                  type: string
                patientName:
                  type: string
                patientToken:
                  type: string
                doctorId:
                  type: string
                date:
                  type: string
                  format: date
                time:
                  type: string
                phone:
                  type: string
      responses:
        "201":
          description: Created
  /api/appointments/{id}:
    get:
      summary: Get appointment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
